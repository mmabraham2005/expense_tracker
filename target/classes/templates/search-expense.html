<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Expense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <h2>Menu</h2>
        <ul>
            <li><a href="/" class="menu-link">Add Expense</a></li>
            <li><a href="/expenses/view" class="menu-link">View Expenses</a></li>
            <li><a href="/expenses/edit" class="menu-link">Edit Expense</a></li>
            <li><a href="/expenses/delete" class="menu-link">Delete Expense</a></li>
            <li class="active"><a href="/expenses/search" class="menu-link">Search Expense</a></li>
            <li><a href="/reports" class="menu-link">Reports</a></li>
            <li><a href="/budgets" class="menu-link">Budgets</a></li>
        </ul>
    </div>

    <div class="content">
        <h1>Expense Tracker Dashboard</h1>
        <p class="subtitle">Search and filter expenses</p>

        <div class="card">
            <h2>Search Filters</h2>

            <form th:action="@{/expenses/search}" method="get">
                <div class="form-grid">

                    <div>
                        <label>Keyword</label>
                        <input type="text" name="keyword" placeholder="Search by name, notes, user..." th:value="${keyword}">
                    </div>

                    <div>
                        <label>Category</label>
                        <select name="categoryId">
                            <option value="">All Categories</option>
                            <option th:each="c : ${categories}"
                                    th:value="${c.categoryId}"
                                    th:text="${c.categoryName}"
                                    th:selected="${selectedCategoryId != null and c.categoryId == selectedCategoryId}">
                            </option>
                        </select>
                    </div>

                    <div>
                        <label>From Date</label>
                        <input type="date" name="fromDate" th:value="${fromDate}">
                    </div>

                    <div>
                        <label>To Date</label>
                        <input type="date" name="toDate" th:value="${toDate}">
                    </div>

                </div>

                <button class="btn" type="submit">Search</button>
            </form>
        </div>

        <div class="card" style="margin-top: 24px;">
            <h2>Search Results</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Payment</th>
                        <th>Notes</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="e : ${expenses}">
                        <td th:text="${e.expenseId}"></td>
                        <td th:text="${e.userName}"></td>
                        <td th:text="${e.expenseName}"></td>
                        <td th:text="${e.categoryName}"></td>
                        <td th:text="${e.amount}"></td>
                        <td th:text="${e.date}"></td>
                        <td th:text="${e.paymentMethod}"></td>
                        <td th:text="${e.notes}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
