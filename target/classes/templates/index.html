<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <h2>Menu</h2>
        <ul>
            <li class="active"><a href="/" class="menu-link">Add Expense</a></li>
            <li><a href="/expenses/view" class="menu-link">View Expenses</a></li>
            <li><a href="/expenses/edit" class="menu-link">Edit Expense</a></li>
            <li><a href="/expenses/delete" class="menu-link">Delete Expense</a></li>
            <li><a href="/expenses/search" class="menu-link">Search Expense</a></li>
            <li><a href="/reports" class="menu-link">Reports</a></li>
            <li><a href="/budgets" class="menu-link">Budgets</a></li>
        </ul>
    </div>

    <div class="content">
        <h1>Expense Tracker Dashboard</h1>
        <p class="subtitle">Track, edit, analyze, and visualize your expenses</p>

        <div class="card">
            <h2>Add Expense</h2>

            <p th:if="${successMessage}" class="success-msg" th:text="${successMessage}"></p>

            <form th:action="@{/expenses/add}" method="post">
                <div class="form-grid">

                    <div>
                        <label>User</label>
                        <select name="userId" required>
                            <option value="">Select user</option>
                            <option th:each="u : ${users}"
                                    th:value="${u.userId}"
                                    th:text="${u.name}">
                            </option>
                        </select>
                    </div>

                    <div>
                        <label>Date</label>
                        <input type="date" name="date" required>
                    </div>

                    <div>
                        <label>Name</label>
                        <input type="text" name="expenseName" required>
                    </div>

                    <div>
                        <label>Category</label>
                        <select name="categoryId" required>
                            <option value="">Select category</option>
                            <option th:each="c : ${categories}"
                                    th:value="${c.categoryId}"
                                    th:text="${c.categoryName}">
                            </option>
                        </select>
                    </div>

                    <div>
                        <label>Amount</label>
                        <input type="number" step="0.01" min="0" name="amount" required>
                    </div>

                    <div>
                        <label>Payment</label>
                        <select name="paymentMethod" required>
                            <option value="">Select payment</option>
                            <option>Cash</option>
                            <option>Credit Card</option>
                            <option>Debit Card</option>
                            <option>Venmo</option>
                            <option>Zelle</option>
                            <option>Apple Pay</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="full-width">
                        <label>Notes</label>
                        <textarea name="notes"></textarea>
                    </div>

                </div>

                <button class="btn" type="submit">Add</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
