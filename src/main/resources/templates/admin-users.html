<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Management — ExpenseTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <a href="/" class="sidebar-brand">
            <div class="brand-icon"><i data-lucide="wallet"></i></div>
            <div class="brand-text">
                <h1>ExpenseTrack</h1>
                <span>Personal Finance</span>
            </div>
        </a>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="/" class="menu-link"><i data-lucide="plus-circle"></i>Add Expense</a></li>
                <li><a href="/expenses/view" class="menu-link"><i data-lucide="receipt"></i>View Expenses</a></li>
                <li><a href="/expenses/edit" class="menu-link"><i data-lucide="pencil"></i>Edit Expense</a></li>
                <li><a href="/expenses/delete" class="menu-link"><i data-lucide="trash-2"></i>Delete Expense</a></li>
                <div class="nav-divider"></div>
                <li><a href="/expenses/search" class="menu-link"><i data-lucide="search"></i>Search</a></li>
                <li><a href="/reports" class="menu-link"><i data-lucide="bar-chart-2"></i>Reports</a></li>
                <li><a href="/budgets" class="menu-link"><i data-lucide="target"></i>Budgets</a></li>
                <li class="active"><a href="/admin/users" class="menu-link"><i data-lucide="users"></i>User Management</a></li>
            </ul>
        </nav>
        <div class="user-bar">
            <div class="user-avatar" th:text="${#strings.toUpperCase(#strings.substring(sessionUserName, 0, 1))}">U</div>
            <div class="user-info">
                <div class="user-name" th:text="${sessionUserName}">User</div>
                <span th:if="${isAdmin}" class="role-badge">Admin</span>
            </div>
            <a href="/logout" class="logout-link" title="Sign out"><i data-lucide="log-out"></i></a>
        </div>
    </aside>

    <div class="content">
        <div class="page-header">
            <h1>User Management</h1>
            <p class="subtitle">All registered accounts and their roles</p>
        </div>

        <div class="card">
            <div class="card-header">
                <i data-lucide="users"></i>
                <h2>All Users</h2>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td style="color: var(--muted); font-variant-numeric: tabular-nums;"
                            th:text="${#numbers.formatInteger(u.userId, 9)}"></td>
                        <td style="font-weight: 500;" th:text="${u.name}"></td>
                        <td style="color: var(--muted);" th:text="${u.email}"></td>
                        <td>
                            <span th:if="${u.role == 'ADMIN'}" class="role-badge">Admin</span>
                            <span th:if="${u.role == 'USER'}"
                                  style="font-size:12px; color: var(--muted);">User</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
