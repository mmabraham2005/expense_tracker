<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up — ExpenseTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="login-page">
    <div class="login-box">

        <div class="login-brand">
            <div class="brand-icon-lg">
                <i data-lucide="wallet"></i>
            </div>
            <h1>ExpenseTrack</h1>
            <p>Create your account</p>
        </div>

        <div class="login-card">
            <div th:if="${error}" class="error-msg">
                <i data-lucide="alert-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/signup}" method="post" onsubmit="return checkPasswords()">
                <div class="login-field">
                    <label>Full name</label>
                    <input type="text" name="name" id="name" placeholder="Jane Smith" required autofocus>
                </div>
                <div class="login-field">
                    <label>Email address</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="login-field">
                    <label>Password</label>
                    <input type="password" name="password" id="password" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <div class="login-field">
                    <label>Confirm password</label>
                    <input type="password" id="confirm" placeholder="••••••••" required>
                    <span id="pw-mismatch" style="display:none; color:#f43f5e; font-size:12px; margin-top:4px;">Passwords do not match.</span>
                </div>
                <button class="login-btn" type="submit">
                    <i data-lucide="user-plus"></i>
                    Create account
                </button>
            </form>
        </div>

        <p class="login-footer">
            Already have an account?
            <a href="/login" style="color:var(--accent); text-decoration:none;">Sign in</a>
        </p>
    </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
<script>
    function checkPasswords() {
        const pw  = document.getElementById('password').value;
        const cfm = document.getElementById('confirm').value;
        if (pw !== cfm) {
            document.getElementById('pw-mismatch').style.display = 'block';
            return false;
        }
        return true;
    }
</script>
</body>
</html>
