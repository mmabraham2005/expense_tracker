<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search — ExpenseTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <a href="/" class="sidebar-brand">
            <div class="brand-icon"><i data-lucide="wallet"></i></div>
            <div class="brand-text">
                <h1>ExpenseTrack</h1>
                <span>Personal Finance</span>
            </div>
        </a>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="/" class="menu-link"><i data-lucide="plus-circle"></i>Add Expense</a></li>
                <li><a href="/expenses/view" class="menu-link"><i data-lucide="receipt"></i>View Expenses</a></li>
                <li><a href="/expenses/edit" class="menu-link"><i data-lucide="pencil"></i>Edit Expense</a></li>
                <li><a href="/expenses/delete" class="menu-link"><i data-lucide="trash-2"></i>Delete Expense</a></li>
                <div class="nav-divider"></div>
                <li class="active"><a href="/expenses/search" class="menu-link"><i data-lucide="search"></i>Search</a></li>
                <li><a href="/reports" class="menu-link"><i data-lucide="bar-chart-2"></i>Reports</a></li>
                <li><a href="/budgets" class="menu-link"><i data-lucide="target"></i>Budgets</a></li>
                <li th:if="${isAdmin}"><a href="/admin/users" class="menu-link"><i data-lucide="users"></i>User Management</a></li>
            </ul>
        </nav>
        <div class="user-bar">
            <div class="user-avatar" th:text="${#strings.toUpperCase(#strings.substring(sessionUserName, 0, 1))}">U</div>
            <div class="user-info">
                <div class="user-name" th:text="${sessionUserName}">User</div>
                <span th:if="${isAdmin}" class="role-badge">Admin</span>
            </div>
            <a href="/logout" class="logout-link" title="Sign out"><i data-lucide="log-out"></i></a>
        </div>
    </aside>

    <div class="content">
        <div class="page-header">
            <h1>Search Expenses</h1>
            <p class="subtitle">Filter and find specific transactions</p>
        </div>

        <div class="card">
            <div class="card-header">
                <i data-lucide="filter"></i>
                <h2>Filters</h2>
            </div>

            <form th:action="@{/expenses/search}" method="get">
                <div class="form-grid">

                    <div class="full-width">
                        <label>Keyword</label>
                        <input type="text" name="keyword"
                               placeholder="Search by name, notes, category, user..."
                               th:value="${keyword}">
                    </div>

                    <div>
                        <label>Category</label>
                        <select name="categoryId">
                            <option value="">All Categories</option>
                            <option th:each="c : ${categories}"
                                    th:value="${c.categoryId}"
                                    th:text="${c.categoryName}"
                                    th:selected="${selectedCategoryId != null and c.categoryId == selectedCategoryId}">
                            </option>
                        </select>
                    </div>

                    <div></div>

                    <div>
                        <label>From Date</label>
                        <input type="date" name="fromDate" th:value="${fromDate}">
                    </div>

                    <div>
                        <label>To Date</label>
                        <input type="date" name="toDate" th:value="${toDate}">
                    </div>

                    <div>
                        <label>Min Amount ($)</label>
                        <input type="number" name="minAmount" min="0" step="0.01"
                               placeholder="0.00" th:value="${minAmount}">
                    </div>

                    <div>
                        <label>Max Amount ($)</label>
                        <input type="number" name="maxAmount" min="0" step="0.01"
                               placeholder="Any" th:value="${maxAmount}">
                    </div>

                </div>

                <button class="btn" type="submit">
                    <i data-lucide="search"></i>
                    Search
                </button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                <i data-lucide="list"></i>
                <h2>Results</h2>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>User</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Payment</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${expenses}">
                        <td style="color: var(--muted); font-variant-numeric: tabular-nums;" th:text="${#numbers.formatInteger(e.expenseId, 9)}"></td>
                        <td th:text="${e.userName}"></td>
                        <td style="font-weight: 500;" th:text="${e.expenseName}"></td>
                        <td><span class="badge badge-cat" th:text="${e.categoryName}"></span></td>
                        <td><span class="amount-cell" th:text="${'$' + #numbers.formatDecimal(e.amount, 1, 'COMMA', 2, 'POINT')}"></span></td>
                        <td style="color: var(--muted);" th:text="${e.date}"></td>
                        <td><span class="badge badge-pay" th:text="${e.paymentMethod}"></span></td>
                        <td style="color: var(--muted); font-size: 13px;" th:text="${e.notes}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
