<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Delete Expense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <h2>Menu</h2>
        <ul>
            <li><a href="/" class="menu-link">Add Expense</a></li>
            <li><a href="/expenses/view" class="menu-link">View Expenses</a></li>
            <li><a href="/expenses/edit" class="menu-link">Edit Expense</a></li>
            <li class="active"><a href="/expenses/delete" class="menu-link">Delete Expense</a></li>
            <li><a href="/expenses/search" class="menu-link">Search Expense</a></li>
            <li><a href="/reports" class="menu-link">Reports</a></li>
            <li><a href="/budgets" class="menu-link">Budgets</a></li>
        </ul>
    </div>

    <div class="content">
        <h1>Expense Tracker Dashboard</h1>
        <p class="subtitle">Choose an expense to delete</p>

        <div class="card">
            <h2>Delete Expense</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Payment</th>
                        <th>Notes</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="e : ${expenses}">
                        <td th:text="${e.expenseId}"></td>
                        <td th:text="${e.userName}"></td>
                        <td th:text="${e.expenseName}"></td>
                        <td th:text="${e.categoryName}"></td>
                        <td th:text="${e.amount}"></td>
                        <td th:text="${e.date}"></td>
                        <td th:text="${e.paymentMethod}"></td>
                        <td th:text="${e.notes}"></td>
                        <td>
                            <form th:action="@{/expenses/delete}" method="post">
                                <input type="hidden" name="expenseId" th:value="${e.expenseId}">
                                <button class="btn-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
